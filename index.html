<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>シリアル読み取り - 発送検品</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" onerror="window.__html5QrcodeLoadFailed = true;"></script>
<style>
  :root {
    --ink: #12181f;
    --panel: #1a222c;
    --panel-2: #212b37;
    --line: #2c3846;
    --accent: #2fd18f;
    --accent-dim: #1f9e6c;
    --danger: #ff5c5c;
    --danger-dim: #d9433f;
    --text: #eef2f6;
    --text-dim: #8b98a8;
    --warn: #ffb454;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    touch-action: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* ===== ヘッダー ===== */
  #header {
    flex: 0 0 auto;
    padding: calc(10px + var(--safe-top)) 16px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  #header .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #header .title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  #header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
  }

  #count-badge {
    display: flex;
    align-items: baseline;
    gap: 4px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 14px;
  }

  #count-badge .num {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  #count-badge .unit {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
  }

  /* ===== カメラエリア ===== */
  #scan-area {
    flex: 0 0 auto;
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: 42vh;
    background: #000;
    overflow: hidden;
  }

  #reader {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    display: block !important;
    z-index: 1 !important;
  }

  /* html5-qrcode が生成する内部要素を非表示・無害化 */
  #reader img {
    display: none !important;
  }
  #reader__scan_region {
    background: transparent !important;
    position: absolute !important;
    inset: 0 !important;
  }
  #reader__dashboard {
    display: none !important;
  }
  #reader__scan_region > div {
    box-shadow: none !important;
    border: none !important;
  }
  #reader > div {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
  }

  .scan-frame {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .scan-frame-box {
    width: 78%;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    position: relative;
  }

  .scan-frame-box::before,
  .scan-frame-box::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: var(--accent);
    border-style: solid;
  }

  .corner {
    position: absolute;
    width: 26px;
    height: 26px;
    border-color: var(--accent);
    border-style: solid;
    filter: drop-shadow(0 0 3px rgba(47, 209, 143, 0.6));
  }
  .corner.tl { top: -2px; left: -2px; border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
  .corner.tr { top: -2px; right: -2px; border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }

  .scan-line {
    position: absolute;
    left: 4%;
    right: 4%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 8%;
    animation: scanmove 2.2s ease-in-out infinite;
    box-shadow: 0 0 8px 1px rgba(47, 209, 143, 0.7);
  }

  @keyframes scanmove {
    0%   { top: 6%; opacity: 0.9; }
    50%  { top: 92%; opacity: 0.9; }
    100% { top: 6%; opacity: 0.9; }
  }

  #cam-status {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    z-index: 6;
    pointer-events: none;
  }

  #cam-switch-bar {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 25;
    display: none;
  }

  #cam-switch-bar.visible {
    display: block;
  }

  #cam-select {
    background: rgba(20, 26, 33, 0.9);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 600;
    max-width: 46vw;
    -webkit-appearance: none;
    appearance: none;
  }

  #cam-start-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: rgba(10, 14, 18, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    text-align: center;
  }

  #cam-start-overlay.hidden {
    display: none;
  }

  #btn-start-camera {
    border: none;
    border-radius: 12px;
    background: var(--accent-dim);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    padding: 14px 28px;
  }

  #btn-start-camera:active {
    background: var(--accent);
  }

  #cam-error-detail {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-dim);
    max-width: 320px;
    white-space: pre-wrap;
    text-align: left;
  }

  #cam-error-detail.show-error {
    color: var(--warn);
  }

  .secondary-btn {
    border: 1px solid var(--line) !important;
    background: transparent !important;
    color: var(--text-dim) !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    padding: 8px 16px !important;
    border-radius: 20px !important;
    margin-top: 4px;
  }

  .secondary-btn:active {
    background: var(--panel-2) !important;
  }

  #diagnose-result {
    font-size: 11px;
    line-height: 1.8;
    color: var(--text-dim);
    max-width: 320px;
    text-align: left;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    white-space: pre-wrap;
  }

  #diagnose-result:empty {
    display: none;
  }

  .dup-toast {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 180, 84, 0.95);
    color: #2a1c00;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 15;
    opacity: 0;
    white-space: nowrap;
  }
  .dup-toast.show {
    animation: toastpop 1.4s ease;
  }
  @keyframes toastpop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-4px); }
  }

  /* ===== リストエリア ===== */
  #list-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ink);
  }

  #list-heading {
    flex: 0 0 auto;
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #list-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
    padding: 0 12px 8px;
  }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 6px;
    padding-bottom: 20px;
  }
  #empty-state .msg {
    font-size: 13px;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    animation: itemin 0.25s ease;
  }

  @keyframes itemin {
    0% { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .item-row .idx {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  .item-row .serial {
    flex: 1 1 auto;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    word-break: break-all;
  }

  .item-row .del-btn {
    flex: 0 0 auto;
    width: 44px;
    height: 30px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .item-row .del-btn:active {
    background: var(--danger-dim);
    color: #fff;
    border-color: var(--danger-dim);
  }

  /* ===== 下部固定ボタン ===== */
  #action-bar {
    flex: 0 0 auto;
    display: flex;
    gap: 10px;
    padding: 10px 16px calc(12px + var(--safe-bottom));
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 20;
  }

  #action-bar button {
    flex: 1 1 0;
    border: none;
    border-radius: 12px;
    padding: 15px 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #fff;
  }

  #btn-clear {
    background: var(--danger-dim);
  }
  #btn-clear:active {
    background: #b83431;
  }

  #btn-copy {
    background: var(--accent-dim);
  }
  #btn-copy:active {
    background: #187e58;
  }

  #btn-copy.copied {
    background: var(--accent);
  }

  /* ===== モーダル（確認） ===== */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.show {
    display: flex;
  }
  #modal-sheet {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    padding: 22px 20px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--line);
  }
  #modal-sheet .modal-title {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  #modal-sheet .modal-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 18px;
    line-height: 1.6;
  }
  #modal-sheet .modal-btns {
    display: flex;
    gap: 10px;
  }
  #modal-sheet button {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px 0;
    font-size: 14px;
    font-weight: 700;
  }
  #modal-cancel {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line) !important;
  }
  #modal-confirm {
    background: var(--danger-dim);
    color: #fff;
  }

  /* トースト（コピー完了など） */
  #global-toast {
    position: fixed;
    top: calc(70px + var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30, 38, 48, 0.96);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 24px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  #global-toast.show {
    animation: gtoast 1.8s ease;
  }
  @keyframes gtoast {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    12%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ヘッダー -->
  <div id="header">
    <div class="title-block">
      <div class="title">シリアル読み取り</div>
      <div class="subtitle">箱詰め検品スキャン</div>
    </div>
    <div id="count-badge">
      <span class="num" id="count-num">0</span>
      <span class="unit">件</span>
    </div>
  </div>

  <!-- カメラエリア -->
  <div id="scan-area">
    <div id="reader"></div>
    <div class="dup-toast" id="dup-toast">重複しています</div>
    <div class="scan-frame">
      <div class="scan-frame-box">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div id="cam-status"></div>
    <div id="cam-switch-bar">
      <select id="cam-select"></select>
    </div>
    <div id="cam-start-overlay">
      <button id="btn-start-camera">カメラを起動する</button>
      <div id="cam-error-detail"></div>
      <button id="btn-diagnose" class="secondary-btn">起動しない場合はこちら（診断）</button>
      <div id="diagnose-result"></div>
    </div>
  </div>

  <!-- リストエリア -->
  <div id="list-wrap">
    <div id="list-heading">
      <span>読み取り履歴</span>
      <span id="list-heading-sub"></span>
    </div>
    <div id="list-scroll">
      <div id="empty-state">
        <div class="msg">スキャンするとここに追加されます</div>
      </div>
      <div id="list-items"></div>
    </div>
  </div>

  <!-- 固定アクションボタン -->
  <div id="action-bar">
    <button id="btn-clear">
      <span>一括削除</span>
    </button>
    <button id="btn-copy">
      <span id="btn-copy-label">一括コピー</span>
    </button>
  </div>

</div>

<!-- 確認モーダル -->
<div id="modal-overlay">
  <div id="modal-sheet">
    <div class="modal-title">リストを削除しますか</div>
    <div class="modal-desc">読み取り済みのシリアルナンバーがすべて削除されます。この操作は取り消せません。</div>
    <div class="modal-btns">
      <button id="modal-cancel">キャンセル</button>
      <button id="modal-confirm">削除する</button>
    </div>
  </div>
</div>

<div id="global-toast"></div>

<script>
(function () {
  "use strict";

  // ===== 状態管理 =====
  var serialSet = new Set();      // 重複チェック用
  var serialList = [];            // 表示順（新しい順）
  var isProcessingScan = false;   // 連続読み取り防止フラグ
  var scanCooldownMs = 1200;      // 同一コード連続検知の抑制時間

  var elCountNum = document.getElementById("count-num");
  var elListItems = document.getElementById("list-items");
  var elEmptyState = document.getElementById("empty-state");
  var elListHeadingSub = document.getElementById("list-heading-sub");
  var elDupToast = document.getElementById("dup-toast");
  var elCamStatus = document.getElementById("cam-status");
  var elGlobalToast = document.getElementById("global-toast");

  // ===== 音声フィードバック（Web Audio API） =====
  var audioCtx = null;
  function ensureAudioContext() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playBeep() {
    var ctx = ensureAudioContext();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 1800;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.13);
  }

  function playErrorTone() {
    var ctx = ensureAudioContext();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.value = 320;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.16);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.17);
  }

  // ===== 数値抽出（末尾の連続した数字） =====
  function extractSerial(rawText) {
    if (!rawText) return null;
    var trimmed = String(rawText).trim();
    var match = trimmed.match(/(\d+)\s*$/);
    if (match && match[1]) {
      return match[1];
    }
    return null;
  }

  // ===== リスト描画 =====
  function renderList() {
    elCountNum.textContent = String(serialList.length);
    elListHeadingSub.textContent = serialList.length > 0 ? "最新が上に表示されます" : "";

    if (serialList.length === 0) {
      elEmptyState.style.display = "flex";
      elListItems.innerHTML = "";
      return;
    }
    elEmptyState.style.display = "none";

    var html = "";
    for (var i = 0; i < serialList.length; i++) {
      var displayIndex = serialList.length - i;
      var serial = serialList[i];
      html +=
        '<div class="item-row" data-serial="' + serial + '">' +
          '<div class="idx">' + displayIndex + '</div>' +
          '<div class="serial">' + escapeHtml(serial) + '</div>' +
          '<button class="del-btn" data-action="delete-one" data-serial="' + serial + '">削除</button>' +
        '</div>';
    }
    elListItems.innerHTML = html;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ===== 個別削除（イベント委譲） =====
  elListItems.addEventListener("click", function (e) {
    var btn = e.target.closest('[data-action="delete-one"]');
    if (!btn) return;
    var serial = btn.getAttribute("data-serial");
    removeSerial(serial);
  });

  function removeSerial(serial) {
    serialSet.delete(serial);
    var idx = serialList.indexOf(serial);
    if (idx !== -1) serialList.splice(idx, 1);
    renderList();
  }

  // ===== 一時演出 =====
  function showDupToast() {
    elDupToast.classList.remove("show");
    void elDupToast.offsetWidth;
    elDupToast.classList.add("show");
  }

  function showGlobalToast(msg) {
    elGlobalToast.textContent = msg;
    elGlobalToast.classList.remove("show");
    void elGlobalToast.offsetWidth;
    elGlobalToast.classList.add("show");
  }

  // ===== スキャン成功時のハンドラ =====
  var lastDecodedText = null;
  var lastDecodedAt = 0;

  function onScanSuccess(decodedText) {
    var now = Date.now();
    if (decodedText === lastDecodedText && (now - lastDecodedAt) < scanCooldownMs) {
      return; // 同一コードの連続検知を抑制
    }
    lastDecodedText = decodedText;
    lastDecodedAt = now;

    var serial = extractSerial(decodedText);

    if (!serial) {
      playErrorTone();
      showGlobalToast("数字を認識できませんでした");
      return;
    }

    if (serialSet.has(serial)) {
      playErrorTone();
      showDupToast();
      return;
    }

    serialSet.add(serial);
    serialList.unshift(serial);
    renderList();

    playBeep();
  }

  function onScanFailure() {
    // 未検出フレームは無視（頻発するためログ出力しない）
  }

  // ===== 一括削除 =====
  var elModalOverlay = document.getElementById("modal-overlay");
  var elModalCancel = document.getElementById("modal-cancel");
  var elModalConfirm = document.getElementById("modal-confirm");

  document.getElementById("btn-clear").addEventListener("click", function () {
    if (serialList.length === 0) {
      showGlobalToast("リストは空です");
      return;
    }
    elModalOverlay.classList.add("show");
  });

  elModalCancel.addEventListener("click", function () {
    elModalOverlay.classList.remove("show");
  });

  elModalOverlay.addEventListener("click", function (e) {
    if (e.target === elModalOverlay) {
      elModalOverlay.classList.remove("show");
    }
  });

  elModalConfirm.addEventListener("click", function () {
    serialSet.clear();
    serialList = [];
    renderList();
    elModalOverlay.classList.remove("show");
    showGlobalToast("リストを削除しました");
  });

  // ===== 一括コピー =====
  var elBtnCopy = document.getElementById("btn-copy");
  var elBtnCopyLabel = document.getElementById("btn-copy-label");

  elBtnCopy.addEventListener("click", function () {
    if (serialList.length === 0) {
      showGlobalToast("コピーする項目がありません");
      return;
    }
    // 表示は新しい順だが、コピーは読み取った順（古い→新しい）で出力
    var ordered = serialList.slice().reverse();
    var text = ordered.join("\n");

    copyToClipboard(text).then(function (ok) {
      if (ok) {
        elBtnCopy.classList.add("copied");
        var original = elBtnCopyLabel.textContent;
        elBtnCopyLabel.textContent = "コピーしました";
        showGlobalToast(serialList.length + "件をコピーしました");
        setTimeout(function () {
          elBtnCopy.classList.remove("copied");
          elBtnCopyLabel.textContent = original;
        }, 1500);
      } else {
        showGlobalToast("コピーに失敗しました");
      }
    });
  });

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () {
        return fallbackCopy(text);
      });
    }
    return Promise.resolve(fallbackCopy(text));
  }

  function fallbackCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  // ===== カメラ初期化（Html5Qrcode コアクラス） =====
  var html5QrCode = null;
  var cameraStarted = false;

  var elCamStartOverlay = document.getElementById("cam-start-overlay");
  var elBtnStartCamera = document.getElementById("btn-start-camera");
  var elCamErrorDetail = document.getElementById("cam-error-detail");

  var qrConfig = {
    fps: 12,
    qrbox: function (viewfinderWidth, viewfinderHeight) {
      // QRコード（正方形）とバーコード（横長）の両方を安定して検出できるよう、
      // 走査枠は正方形に近い形にする。横長の枠だとQRコードが収まりきらず
      // 認識率が落ちるため。
      // viewfinderWidth/Height が起動直後で 0 の場合に備え、最小サイズを保証する。
      var minSide = Math.min(viewfinderWidth || 0, viewfinderHeight || 0);
      var size = minSide > 0 ? Math.floor(minSide * 0.78) : 250;
      size = Math.max(size, 180);
      return { width: size, height: size };
    },
    disableFlip: false,
    formatsToSupport: (window.Html5QrcodeSupportedFormats ? [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR
    ] : undefined)
  };

  // 背面の標準レンズ（超広角ではない方）を優先させるため、videoConstraints に
  // 高解像度指定を付与する。多くの端末では、超広角カメラは高解像度に対応して
  // いないか、要求解像度で不利になるため、これにより標準レンズが選ばれやすくなる。
  // 注意: html5-qrcode の start() 第一引数（cameraIdOrConfig）はオブジェクトで渡す場合
  // キーを1つしか許容しないため、解像度指定は videoConstraints 側に含める。
  var qrConfigHighRes = Object.assign({}, qrConfig, {
    videoConstraints: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    }
  });

  // cameraIdOrConfig は常に単一キーのオブジェクトにする
  var cameraConstraintsPrimary = { facingMode: { ideal: "environment" } };
  var cameraConstraintsFallback = { facingMode: "environment" };

  var elCamSwitchBar = document.getElementById("cam-switch-bar");
  var elCamSelect = document.getElementById("cam-select");
  var availableCameras = [];
  var currentCameraId = null;

  // カメラのラベルから「超広角」らしさを判定する。
  // 超広角レンズは ultra wide / 0.5x などの語を含むことが多く、
  // 逆に標準レンズは wide のみ、または番号のみのことが多い。
  function isLikelyUltraWide(label) {
    if (!label) return false;
    return /ultra[\s-]?wide|超広角|0\.5x|UW/i.test(label);
  }

  function isLikelyBackCamera(label) {
    if (!label) return false;
    return /back|rear|environment|背面/i.test(label);
  }

  // 起動に使う背面カメラを推定する。
  // 超広角ラベルを避け、背面カメラの中で最もそれらしいものを選ぶ。
  function pickBestBackCamera(devices) {
    var backCams = devices.filter(function (d) {
      return isLikelyBackCamera(d.label);
    });
    var candidates = backCams.length > 0 ? backCams : devices;

    var nonUltraWide = candidates.filter(function (d) {
      return !isLikelyUltraWide(d.label);
    });
    if (nonUltraWide.length > 0) {
      return nonUltraWide[0];
    }
    return candidates[0];
  }

  function setOverlayError(message) {
    elCamErrorDetail.textContent = message;
    elCamErrorDetail.classList.add("show-error");
  }

  function clearOverlayError() {
    elCamErrorDetail.textContent = "";
    elCamErrorDetail.classList.remove("show-error");
  }

  // 起動前の環境チェック。起動できない根本原因を切り分けて表示する。
  function checkEnvironment() {
    if (!window.isSecureContext) {
      return "HTTPS（または localhost）でアクセスしてください。現在の接続では、ブラウザがカメラの利用を許可しません。";
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      return "この端末またはブラウザはカメラAPIに対応していません。Chrome または Safari の最新版でお試しください。";
    }
    return null;
  }

  function startCamera(constraints, config) {
    return html5QrCode.start(
      constraints,
      config || qrConfig,
      onScanSuccess,
      onScanFailure
    );
  }

  function stringifyError(err) {
    if (!err) return "詳細不明のエラー";
    if (typeof err === "string") return err;
    var name = err.name || "";
    var message = err.message || "";
    if (!name && !message) {
      try { return JSON.stringify(err); } catch (e) { return String(err); }
    }
    return (name ? "[" + name + "] " : "") + message;
  }

  function describeStartError(err) {
    var msg = stringifyError(err);
    var hint = "";
    if (/NotAllowedError|Permission denied|denied/i.test(msg)) {
      hint = "カメラの利用が許可されていません。ブラウザのサイト設定でカメラを「許可」に変更し、再読み込みしてください。";
    } else if (/NotFoundError|no camera/i.test(msg)) {
      hint = "カメラが見つかりません。端末にカメラが搭載されているか確認してください。";
    } else if (/NotReadableError|TrackStartError/i.test(msg)) {
      hint = "カメラを他のアプリが使用中の可能性があります。他のカメラアプリを終了してから再度お試しください。";
    } else if (/OverconstrainedError/i.test(msg)) {
      hint = "指定した条件でカメラを起動できませんでした。";
    } else {
      hint = "カメラを起動できませんでした。";
    }
    // 原因切り分けのため、常に実際のエラー内容も併記する
    return hint + "\n[詳細] " + msg;
  }

  function initCamera() {
    if (window.__html5QrcodeLoadFailed || typeof Html5Qrcode === "undefined") {
      setOverlayError("スキャンライブラリの読み込みに失敗しました。通信環境を確認し、ページを再読み込みしてください。");
      return;
    }

    var envError = checkEnvironment();
    if (envError) {
      setOverlayError(envError);
      return;
    }

    clearOverlayError();
    elBtnStartCamera.disabled = true;
    elBtnStartCamera.textContent = "起動しています…";

    // 一定時間経過してもコールバックが一切来ない場合の保険（無反応状態の検知）
    var settled = false;
    var timeoutId = setTimeout(function () {
      if (settled) return;
      settled = true;
      elBtnStartCamera.disabled = false;
      elBtnStartCamera.textContent = "カメラを起動する";
      setOverlayError("カメラからの応答がありません。ブラウザのアドレスバー付近にカメラ権限のアイコンが出ていないか確認してください。表示されない場合は、ブラウザのサイト設定からこのページのカメラ権限を確認してください。");
    }, 8000);

    try {
      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader", { verbose: false });
      }
    } catch (initErr) {
      clearTimeout(timeoutId);
      elBtnStartCamera.disabled = false;
      elBtnStartCamera.textContent = "カメラを起動する";
      setOverlayError("スキャナーの初期化に失敗しました。\n[詳細] " + stringifyError(initErr));
      return;
    }

    var runStart = function (constraints, config, onAllFailed) {
      var startPromise;
      try {
        startPromise = startCamera(constraints, config);
      } catch (syncErr) {
        onAllFailed(syncErr);
        return;
      }
      startPromise
        .then(function () {
          if (settled) return;
          settled = true;
          clearTimeout(timeoutId);
          onCameraStarted();
        })
        .catch(onAllFailed);
    };

    // 失敗後に即座に再start()するとステートマシンの競合エラー
    // （Cannot transition to a new state, already under transition）を招くため、
    // 次の試行の前に必ず stop() で状態をリセットしてから進む。
    var resetBeforeRetry = function (next) {
      try {
        var scanning = false;
        if (typeof html5QrCode.isScanning === "boolean") {
          scanning = html5QrCode.isScanning;
        } else if (html5QrCode.getState) {
          scanning = html5QrCode.getState() !== 1;
        }
        if (scanning) {
          html5QrCode.stop().then(next).catch(next);
          return;
        }
      } catch (e) {}
      next();
    };

    var errors = [];

    var finishWithError = function (errList) {
      if (settled) return;
      settled = true;
      clearTimeout(timeoutId);
      elBtnStartCamera.disabled = false;
      elBtnStartCamera.textContent = "カメラを起動する";
      var lastErr = errList[errList.length - 1] || "";
      setOverlayError(describeStartError(lastErr) + "\n\n[試行履歴]\n" + errList.join("\n"));
    };

    // facingMode 任せだと機種によって超広角レンズが選ばれることがあるため、
    // 可能であれば先にカメラ一覧を取得し、超広角を避けたカメラを deviceId で
    // 直接指定して起動する。取得できない、またはラベルが得られない端末
    // （iPhone Safari 等）では facingMode 方式にフォールバックする。
    var attemptFacingMode = function () {
      runStart(cameraConstraintsPrimary, qrConfigHighRes, function (err1) {
        errors.push(stringifyError(err1));
        resetBeforeRetry(function () {
          runStart(cameraConstraintsFallback, qrConfig, function (err2) {
            errors.push(stringifyError(err2));
            finishWithError(errors);
          });
        });
      });
    };

    Html5Qrcode.getCameras()
      .then(function (devices) {
        if (!devices || devices.length === 0) {
          attemptFacingMode();
          return;
        }

        availableCameras = devices;
        populateCameraSelect(devices);

        var target = pickBestBackCamera(devices);
        currentCameraId = target.id;
        syncCameraSelectValue();

        runStart({ deviceId: { exact: target.id } }, qrConfigHighRes, function (err1) {
          errors.push("[deviceId優先起動] " + stringifyError(err1));
          resetBeforeRetry(function () {
            // 高解像度指定なしで同じデバイスを再試行
            runStart({ deviceId: { exact: target.id } }, qrConfig, function (err2) {
              errors.push("[deviceId標準起動] " + stringifyError(err2));
              resetBeforeRetry(attemptFacingMode);
            });
          });
        });
      })
      .catch(function (err) {
        errors.push("[カメラ一覧取得] " + stringifyError(err));
        attemptFacingMode();
      });
  }

  // カメラ切り替えセレクタに一覧を反映する
  function populateCameraSelect(devices) {
    elCamSelect.innerHTML = "";
    devices.forEach(function (d, idx) {
      var opt = document.createElement("option");
      opt.value = d.id;
      var label = d.label || ("カメラ " + (idx + 1));
      // 長いラベルは末尾を省略
      if (label.length > 24) label = label.slice(0, 24) + "…";
      opt.textContent = label;
      elCamSelect.appendChild(opt);
    });
    if (devices.length > 1) {
      elCamSwitchBar.classList.add("visible");
    }
  }

  function syncCameraSelectValue() {
    if (currentCameraId) {
      elCamSelect.value = currentCameraId;
    }
  }

  // ユーザーがセレクタでカメラを切り替えたときの処理
  elCamSelect.addEventListener("change", function () {
    var newId = elCamSelect.value;
    if (!newId || newId === currentCameraId || !html5QrCode) return;

    var switchTo = function () {
      runStartSimple({ deviceId: { exact: newId } })
        .then(function () {
          currentCameraId = newId;
          elCamStatus.textContent = "";
        })
        .catch(function (err) {
          showGlobalToast("カメラの切り替えに失敗しました");
          syncCameraSelectValue();
        });
    };

    try {
      var scanning = (typeof html5QrCode.isScanning === "boolean")
        ? html5QrCode.isScanning
        : (html5QrCode.getState ? html5QrCode.getState() !== 1 : false);
      if (scanning) {
        html5QrCode.stop().then(switchTo).catch(switchTo);
      } else {
        switchTo();
      }
    } catch (e) {
      switchTo();
    }
  });

  // カメラ切り替え専用の単純な起動処理（一覧取得やフォールバック連鎖は行わない）
  function runStartSimple(constraints) {
    try {
      return startCamera(constraints, qrConfigHighRes);
    } catch (e) {
      return Promise.reject(e);
    }
  }

  function onCameraStarted() {
    cameraStarted = true;
    elCamStartOverlay.classList.add("hidden");
    elCamStatus.textContent = "";
    // カメラ起動と同じユーザー操作の流れでAudioContextも有効化しておく
    ensureAudioContext();
  }

  elBtnStartCamera.addEventListener("click", function () {
    ensureAudioContext();
    initCamera();
  });

  // ===== 診断機能（ライブラリを介さず直接 getUserMedia を試す） =====
  var elBtnDiagnose = document.getElementById("btn-diagnose");
  var elDiagnoseResult = document.getElementById("diagnose-result");

  elBtnDiagnose.addEventListener("click", function () {
    var lines = [];
    lines.push("URL: " + location.href);
    lines.push("HTTPS判定: " + (window.isSecureContext ? "OK（安全なコンテキスト）" : "NG（保護されていない接続）"));
    lines.push("mediaDevices対応: " + (navigator.mediaDevices ? "あり" : "なし"));
    lines.push("getUserMedia対応: " + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? "あり" : "なし"));
    lines.push("Html5Qrcode読み込み: " + (typeof Html5Qrcode !== "undefined" ? "OK" : "失敗（CDNブロックの可能性）"));
    lines.push("UA: " + navigator.userAgent);
    elDiagnoseResult.textContent = lines.join("\n") + "\n\n直接カメラ許可を試しています…";

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      elDiagnoseResult.textContent += "\nこのブラウザではカメラAPIが使えません。";
      return;
    }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } })
      .then(function (stream) {
        elDiagnoseResult.textContent += "\n結果: カメラ権限のダイアログが表示され、許可されました。";
        stream.getTracks().forEach(function (t) { t.stop(); });

        return Html5Qrcode.getCameras().then(function (devices) {
          if (devices && devices.length > 0) {
            var camLines = devices.map(function (d, i) {
              return "  " + (i + 1) + ". " + (d.label || "(ラベル取得不可)");
            });
            elDiagnoseResult.textContent += "\n\n検出されたカメラ一覧:\n" + camLines.join("\n");
          } else {
            elDiagnoseResult.textContent += "\n\nカメラ一覧を取得できませんでした。";
          }
        }).catch(function () {
          elDiagnoseResult.textContent += "\n\nカメラ一覧の取得に失敗しました。";
        });
      })
      .catch(function (err) {
        var name = (err && err.name) || "UnknownError";
        elDiagnoseResult.textContent += "\n結果: 直接アクセスも失敗しました。（" + name + "）\n" + describeStartError(err);
      });
  });

  // ページ非表示時にカメラを一時停止（バッテリー節約・端末仕様上の安全策）
  document.addEventListener("visibilitychange", function () {
    if (!html5QrCode || !cameraStarted) return;
    if (document.hidden) {
      if (html5QrCode.getState && html5QrCode.getState() === Html5QrcodeScannerState.SCANNING) {
        html5QrCode.pause(true);
      }
    } else {
      if (html5QrCode.getState && html5QrCode.getState() === Html5QrcodeScannerState.PAUSED) {
        html5QrCode.resume();
      }
    }
  });

})();
</script>

</body>
</html>
