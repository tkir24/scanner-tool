<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>シリアル読み取り - 発送検品</title>
<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@1/dist/iife/reader/index.js" onerror="window.__zxingLoadFailed = true;"></script>
<style>
  :root {
    --ink: #12181f;
    --panel: #1a222c;
    --panel-2: #212b37;
    --line: #2c3846;
    --accent: #2fd18f;
    --accent-dim: #1f9e6c;
    --danger: #ff5c5c;
    --danger-dim: #d9433f;
    --text: #eef2f6;
    --text-dim: #8b98a8;
    --warn: #ffb454;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    touch-action: none;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* ===== ヘッダー ===== */
  #header {
    flex: 0 0 auto;
    padding: calc(10px + var(--safe-top)) 16px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
  }

  #header .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #header .title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  #count-badge {
    display: flex;
    align-items: baseline;
    gap: 4px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 14px;
  }

  #count-badge .num {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  #count-badge .unit {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 600;
  }

  #count-badge.verify-badge .num {
    font-size: 16px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #btn-verify-mode {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 12px;
  }

  #btn-verify-mode.active {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: #fff;
  }

  /* ===== カメラエリア ===== */
  #scan-area {
    flex: 0 0 auto;
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    /* リスト（読み取り履歴）エリアがカメラと同等以上の面積を確保できるよう、
       カメラエリアの高さ上限を控えめにする。 */
    max-height: 34vh;
    background: #000;
    overflow: hidden;
  }

  #reader {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  #scan-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    display: block;
  }

  #cam-status {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    z-index: 6;
    pointer-events: none;
  }

  #btn-stop-camera {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 25;
    display: none;
    border: 1px solid var(--line);
    background: rgba(10, 14, 18, 0.7);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 20px;
  }

  #btn-stop-camera.visible {
    display: block;
  }

  #cam-start-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: rgba(10, 14, 18, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    text-align: center;
  }

  #cam-start-overlay.hidden {
    display: none;
  }

  #btn-start-camera {
    border: none;
    border-radius: 12px;
    background: var(--accent-dim);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.02em;
    padding: 14px 28px;
  }

  #cam-error-detail {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-dim);
    max-width: 320px;
    white-space: pre-wrap;
    text-align: left;
  }

  #cam-error-detail.show-error {
    color: var(--warn);
  }

  .dup-toast {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 180, 84, 0.95);
    color: #2a1c00;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 15;
    opacity: 0;
    white-space: nowrap;
  }
  .dup-toast.show {
    animation: toastpop 1.4s ease;
  }
  @keyframes toastpop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(6px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(4px); }
  }

  /* ===== リストエリア ===== */
  #list-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--ink);
  }

  #list-heading {
    flex: 0 0 auto;
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #list-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
    padding: 0 12px 8px;
  }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 6px;
    padding-bottom: 20px;
  }
  #empty-state .msg {
    font-size: 13px;
  }

  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    animation: itemin 0.25s ease;
  }

  @keyframes itemin {
    0% { opacity: 0; transform: translateY(-8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .item-row .idx {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--panel-2);
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  .item-row .serial {
    flex: 1 1 auto;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    word-break: break-all;
  }

  .item-row .copy-one-btn {
    flex: 0 0 auto;
    width: 52px;
    height: 30px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .item-row .del-btn {
    flex: 0 0 auto;
    width: 44px;
    height: 30px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== 下部固定ボタン ===== */
  #action-bar {
    flex: 0 0 auto;
    display: flex;
    gap: 10px;
    padding: 10px 16px calc(12px + var(--safe-bottom));
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 20;
  }

  #action-bar button {
    flex: 1 1 0;
    border: none;
    border-radius: 12px;
    padding: 15px 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #fff;
  }

  #btn-clear {
    background: var(--danger-dim);
  }

  #btn-copy {
    background: var(--accent-dim);
  }

  /* ===== モーダル（確認） ===== */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.show {
    display: flex;
  }
  #modal-sheet {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    padding: 22px 20px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--line);
  }
  #modal-sheet .modal-title {
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  #modal-sheet .modal-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 18px;
    line-height: 1.6;
  }
  #modal-sheet .modal-btns {
    display: flex;
    gap: 10px;
  }
  #modal-sheet button {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px 0;
    font-size: 14px;
    font-weight: 700;
  }
  #modal-cancel {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line) !important;
  }
  #modal-confirm {
    background: var(--danger-dim);
    color: #fff;
  }

  /* ===== 照合設定パネル ===== */
  #verify-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 120;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  #verify-overlay.show {
    display: flex;
  }
  #verify-sheet {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border-radius: 16px 16px 0 0;
    padding: 22px 20px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--line);
  }
  .verify-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .verify-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
    line-height: 1.6;
  }
  #verify-input {
    width: 100%;
    height: 120px;
    background: var(--ink);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 12px;
    resize: vertical;
    font-family: inherit;
    -webkit-appearance: none;
  }
  #verify-count-info {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    margin: 8px 2px 14px;
    min-height: 16px;
  }
  .verify-btns {
    display: flex;
    gap: 10px;
  }
  .verify-btns button {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 13px 0;
    font-size: 14px;
    font-weight: 700;
  }
  #verify-cancel {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line) !important;
  }
  #verify-start {
    background: var(--accent-dim);
    color: #fff;
  }
  .verify-stop-btn {
    width: 100%;
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--danger-dim);
    color: var(--danger);
    font-size: 13px;
    font-weight: 700;
    padding: 11px 0;
    border-radius: 10px;
    display: none;
  }
  .verify-stop-btn.visible {
    display: block;
  }

  /* ===== 未登録検出時の警告オーバーレイ ===== */
  #alert-overlay {
    position: fixed;
    inset: 0;
    background: rgba(180, 20, 20, 0.35);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #alert-overlay.show {
    display: flex;
    animation: alertflash 0.5s ease infinite alternate;
  }
  @keyframes alertflash {
    0%   { background: rgba(200, 20, 20, 0.30); }
    100% { background: rgba(200, 20, 20, 0.55); }
  }
  #alert-box {
    width: 100%;
    max-width: 380px;
    background: var(--danger-dim);
    border: 3px solid #fff;
    border-radius: 20px;
    padding: 28px 22px 22px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #alert-headline {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  #alert-sub {
    font-size: 14px;
    color: #ffe0e0;
    margin-bottom: 16px;
  }
  #alert-serial {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    background: rgba(0,0,0,0.25);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 22px;
    word-break: break-all;
    font-variant-numeric: tabular-nums;
  }
  #alert-dismiss {
    width: 100%;
    background: #fff;
    color: var(--danger-dim);
    border: none;
    border-radius: 12px;
    padding: 15px 0;
    font-size: 16px;
    font-weight: 800;
  }

  /* トースト（コピー完了など） */
  #global-toast {
    position: fixed;
    top: calc(var(--safe-top) + 50px + 34vh - 30px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30, 38, 48, 0.96);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 24px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    max-width: 88vw;
  }
  #global-toast.wrap {
    white-space: normal;
    text-align: center;
    line-height: 1.5;
    border-radius: 16px;
  }
  #global-toast.show {
    animation: gtoast 1.8s ease;
  }
  #global-toast.show.long {
    animation-duration: 3.2s;
  }
  @keyframes gtoast {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    12%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ヘッダー -->
  <div id="header">
    <div class="title-block">
      <div class="title">シリアル読み取り</div>
    </div>
    <div class="header-right">
      <button id="btn-verify-mode">照合</button>
      <div id="count-badge">
        <span class="num" id="count-num">0</span>
        <span class="unit">件</span>
      </div>
    </div>
  </div>

  <!-- カメラエリア -->
  <div id="scan-area">
    <div id="reader">
      <video id="scan-video" playsinline muted></video>
    </div>
    <div class="dup-toast" id="dup-toast">重複しています</div>
    <div id="cam-status"></div>
    <button id="btn-stop-camera">カメラを停止</button>
    <div id="cam-start-overlay">
      <button id="btn-start-camera">カメラを起動する</button>
      <div id="cam-error-detail"></div>
    </div>
  </div>

  <!-- リストエリア -->
  <div id="list-wrap">
    <div id="list-heading">
      <span>読み取り履歴</span>
      <span id="list-heading-sub"></span>
    </div>
    <div id="list-scroll">
      <div id="empty-state">
        <div class="msg">スキャンするとここに追加されます</div>
      </div>
      <div id="list-items"></div>
    </div>
  </div>

  <!-- 固定アクションボタン -->
  <div id="action-bar">
    <button id="btn-copy">
      <span id="btn-copy-label">一括コピー</span>
    </button>
    <button id="btn-clear">
      <span>一括削除</span>
    </button>
  </div>

</div>

<!-- 確認モーダル -->
<div id="modal-overlay">
  <div id="modal-sheet">
    <div class="modal-title">リストを削除しますか</div>
    <div class="modal-desc">読み取り済みのシリアルナンバーがすべて削除されます。この操作は取り消せません。</div>
    <div class="modal-btns">
      <button id="modal-cancel">キャンセル</button>
      <button id="modal-confirm">削除する</button>
    </div>
  </div>
</div>

<div id="global-toast"></div>

<!-- 照合設定パネル -->
<div id="verify-overlay">
  <div id="verify-sheet">
    <div class="verify-title">照合モード</div>
    <div class="verify-desc">発送予定のシリアルナンバーを貼り付けてください（1行に1つ、または改行・カンマ・スペース区切り）。照合を開始すると、スキャンしたバッテリーがこのリストに<b>無い</b>場合に警告します。</div>
    <textarea id="verify-input" placeholder="例）&#10;34949479&#10;34949480&#10;34949481"></textarea>
    <div id="verify-count-info"></div>
    <div class="verify-btns">
      <button id="verify-cancel">キャンセル</button>
      <button id="verify-start">照合を開始</button>
    </div>
    <button id="verify-stop" class="verify-stop-btn">照合モードを終了する</button>
  </div>
</div>

<!-- 未登録検出時の警告オーバーレイ -->
<div id="alert-overlay">
  <div id="alert-box">
    <div id="alert-headline">発送しないバッテリー</div>
    <div id="alert-sub">このシリアルは発送リストにありません</div>
    <div id="alert-serial"></div>
    <button id="alert-dismiss">確認した</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ===== 状態管理 =====
  var serialSet = new Set();      // 重複チェック用
  var serialList = [];            // 表示順（新しい順）
  var isProcessingScan = false;   // 連続読み取り防止フラグ
  var scanCooldownMs = 1200;      // 同一コード連続検知の抑制時間

  // 照合モード用
  var verifyMode = false;         // 照合モードが有効か
  var verifySet = new Set();      // 発送予定シリアル（照合の正解リスト）
  var verifyCheckedSet = new Set(); // 照合モード中に確認済みのシリアル
  var alertShowing = false;       // 警告オーバーレイ表示中か

  var elCountNum = document.getElementById("count-num");
  var elCountBadge = document.getElementById("count-badge");
  var elListItems = document.getElementById("list-items");
  var elEmptyState = document.getElementById("empty-state");
  var elListHeadingSub = document.getElementById("list-heading-sub");
  var elDupToast = document.getElementById("dup-toast");
  var elCamStatus = document.getElementById("cam-status");
  var elGlobalToast = document.getElementById("global-toast");

  // ===== 音声フィードバック（Web Audio API） =====
  var audioCtx = null;
  function ensureAudioContext() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playBeep() {
    var ctx = ensureAudioContext();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 1800;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.13);
  }

  function playErrorTone() {
    var ctx = ensureAudioContext();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.value = 320;
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.16);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.17);
  }

  // 照合モードで未登録バッテリーを検出したときの強い警告音。
  // 低音のブザーを3回連続で鳴らし、はっきり気づけるようにする。
  function playAlarmTone() {
    var ctx = ensureAudioContext();
    if (!ctx) return;
    var t0 = ctx.currentTime;
    for (var i = 0; i < 3; i++) {
      var start = t0 + i * 0.22;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.value = 220;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.3, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + 0.2);
    }
  }

  // ===== 数値抽出（末尾の連続した数字） =====
  function extractSerial(rawText) {
    if (!rawText) return null;
    var trimmed = String(rawText).trim();
    var match = trimmed.match(/(\d+)\s*$/);
    if (match && match[1]) {
      return match[1];
    }
    return null;
  }

  // ===== リスト描画 =====
  function renderList() {
    // 照合モード中はバッジに照合進捗を表示しているため、ここでは上書きしない
    if (!verifyMode) {
      elCountNum.textContent = String(serialList.length);
    }
    elListHeadingSub.textContent = serialList.length > 0 ? "最新が上に表示されます" : "";

    if (serialList.length === 0) {
      elEmptyState.style.display = "flex";
      elListItems.innerHTML = "";
      return;
    }
    elEmptyState.style.display = "none";

    var html = "";
    for (var i = 0; i < serialList.length; i++) {
      var displayIndex = serialList.length - i;
      var serial = serialList[i];
      html +=
        '<div class="item-row" data-serial="' + serial + '">' +
          '<div class="idx">' + displayIndex + '</div>' +
          '<div class="serial">' + escapeHtml(serial) + '</div>' +
          '<button class="copy-one-btn" data-action="copy-one" data-serial="' + serial + '">コピー</button>' +
          '<button class="del-btn" data-action="delete-one" data-serial="' + serial + '">削除</button>' +
        '</div>';
    }
    elListItems.innerHTML = html;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ===== 個別コピー・個別削除（イベント委譲） =====
  elListItems.addEventListener("click", function (e) {
    var copyBtn = e.target.closest('[data-action="copy-one"]');
    if (copyBtn) {
      var serialToCopy = copyBtn.getAttribute("data-serial");
      copyToClipboard(serialToCopy).then(function (ok) {
        if (ok) {
          showGlobalToast(serialToCopy + " をコピーしました");
        } else {
          showGlobalToast("コピーに失敗しました");
        }
      });
      return;
    }

    var delBtn = e.target.closest('[data-action="delete-one"]');
    if (delBtn) {
      var serialToDelete = delBtn.getAttribute("data-serial");
      removeSerial(serialToDelete);
    }
  });

  function removeSerial(serial) {
    serialSet.delete(serial);
    var idx = serialList.indexOf(serial);
    if (idx !== -1) serialList.splice(idx, 1);
    renderList();
    showGlobalToast(serial + " を削除しました");
  }

  // ===== 一時演出 =====
  function showDupToast() {
    elDupToast.classList.remove("show");
    void elDupToast.offsetWidth;
    elDupToast.classList.add("show");
  }

  function showGlobalToast(msg, isLong) {
    elGlobalToast.textContent = msg;
    elGlobalToast.classList.remove("show", "wrap", "long");
    void elGlobalToast.offsetWidth;
    if (isLong) {
      elGlobalToast.classList.add("wrap", "long");
    }
    elGlobalToast.classList.add("show");
  }

  // ===== スキャン成功時のハンドラ =====
  var lastDecodedText = null;
  var lastDecodedAt = 0;

  function onScanSuccess(decodedText) {
    var now = Date.now();
    if (decodedText === lastDecodedText && (now - lastDecodedAt) < scanCooldownMs) {
      return; // 同一コードの連続検知を抑制
    }
    lastDecodedText = decodedText;
    lastDecodedAt = now;

    var serial = extractSerial(decodedText);

    if (!serial) {
      playErrorTone();
      // 読み取り自体は成功しているが、末尾に数字が見つからなかったケース。
      // 原因切り分けのため、実際に読み取った内容を表示する。
      var preview = decodedText.length > 40 ? decodedText.slice(0, 40) + "…" : decodedText;
      showGlobalToast("数字を認識できませんでした: " + preview, true);
      return;
    }

    // 照合モード中は、通常のリスト追加ではなく照合処理を行う
    if (verifyMode) {
      handleVerifyScan(serial);
      return;
    }

    if (serialSet.has(serial)) {
      playErrorTone();
      showDupToast();
      return;
    }

    serialSet.add(serial);
    serialList.unshift(serial);
    renderList();

    playBeep();
  }

  // 照合モード中のスキャン処理。
  // 発送予定リスト（verifySet）に無いシリアルを検出したら警告する。
  function handleVerifyScan(serial) {
    // 警告表示中は次のスキャンを受け付けない
    if (alertShowing) return;

    if (verifySet.has(serial)) {
      // 発送予定リストにある＝正常なバッテリー
      verifyCheckedSet.add(serial);
      updateVerifyBadge();
      playBeep();
      showGlobalToast("照合OK（" + verifyCheckedSet.size + "/" + verifySet.size + "）　" + serial);
    } else {
      // 発送予定リストに無い＝探している「発送しないバッテリー」
      showUnregisteredAlert(serial);
    }
  }

  // 照合モード中、カウントバッジに「確認済み/発送予定総数」を表示する
  function updateVerifyBadge() {
    if (verifyMode) {
      elCountNum.textContent = verifyCheckedSet.size + "/" + verifySet.size;
    } else {
      elCountNum.textContent = String(serialList.length);
    }
  }

  function onScanFailure() {
    // 未検出フレームは無視（頻発するためログ出力しない）
  }

  // ===== 一括削除 =====
  var elModalOverlay = document.getElementById("modal-overlay");
  var elModalCancel = document.getElementById("modal-cancel");
  var elModalConfirm = document.getElementById("modal-confirm");

  document.getElementById("btn-clear").addEventListener("click", function () {
    if (serialList.length === 0) {
      showGlobalToast("リストは空です");
      return;
    }
    elModalOverlay.classList.add("show");
  });

  elModalCancel.addEventListener("click", function () {
    elModalOverlay.classList.remove("show");
  });

  elModalOverlay.addEventListener("click", function (e) {
    if (e.target === elModalOverlay) {
      elModalOverlay.classList.remove("show");
    }
  });

  elModalConfirm.addEventListener("click", function () {
    serialSet.clear();
    serialList = [];
    renderList();
    elModalOverlay.classList.remove("show");
    showGlobalToast("リストを削除しました");
  });

  // ===== 一括コピー =====
  var elBtnCopy = document.getElementById("btn-copy");
  var elBtnCopyLabel = document.getElementById("btn-copy-label");

  elBtnCopy.addEventListener("click", function () {
    if (serialList.length === 0) {
      showGlobalToast("コピーする項目がありません");
      return;
    }
    // 表示は新しい順だが、コピーは読み取った順（古い→新しい）で出力
    var ordered = serialList.slice().reverse();
    var text = ordered.join("\n");

    copyToClipboard(text).then(function (ok) {
      if (ok) {
        var original = elBtnCopyLabel.textContent;
        elBtnCopyLabel.textContent = "コピーしました";
        showGlobalToast(serialList.length + "件をコピーしました");
        setTimeout(function () {
          elBtnCopyLabel.textContent = original;
        }, 1500);
      } else {
        showGlobalToast("コピーに失敗しました");
      }
    });
  });

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () {
        return fallbackCopy(text);
      });
    }
    return Promise.resolve(fallbackCopy(text));
  }

  function fallbackCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  // ===== 照合モード =====
  var elBtnVerifyMode = document.getElementById("btn-verify-mode");
  var elVerifyOverlay = document.getElementById("verify-overlay");
  var elVerifyInput = document.getElementById("verify-input");
  var elVerifyCountInfo = document.getElementById("verify-count-info");
  var elVerifyCancel = document.getElementById("verify-cancel");
  var elVerifyStart = document.getElementById("verify-start");
  var elVerifyStop = document.getElementById("verify-stop");

  var elAlertOverlay = document.getElementById("alert-overlay");
  var elAlertSerial = document.getElementById("alert-serial");
  var elAlertDismiss = document.getElementById("alert-dismiss");

  // 貼り付けられたテキストからシリアル一覧を抽出する。
  // 想定する入力は主に次の2通り:
  //   (A) 1行に1つ（シリアルそのもの、またはURL全体）
  //   (B) 数値がカンマ・スペースで並んだもの
  // URL内部にもカンマが含まれる（例: ...?b=1,62,GE05,34949481）ため、
  // 単純に全体をカンマ分割するとURL内の数字まで拾ってしまう。
  // これを避けるため、まず改行で行に分け、各行について:
  //   - 英字やスラッシュを含む（URLらしい）行 → 行全体の末尾数字を1つだけ採用
  //   - それ以外（数値の羅列）の行 → カンマ・スペースで分割して各数値を採用
  function parseVerifyList(text) {
    var set = new Set();
    var lines = String(text).split(/[\r\n]+/);
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;

      if (/[a-zA-Z\/:?=&]/.test(line)) {
        // URLらしい行: 末尾の連続数字のみを1つ採用する
        var serial = extractSerial(line);
        if (serial) set.add(serial);
      } else {
        // 数値の羅列とみなし、区切り文字で分割して各数値を採用する
        var tokens = line.split(/[\s,、]+/);
        for (var j = 0; j < tokens.length; j++) {
          var t = tokens[j].trim();
          if (!t) continue;
          var s = extractSerial(t);
          if (s) set.add(s);
        }
      }
    }
    return set;
  }

  // 照合ボタン: パネルを開く
  elBtnVerifyMode.addEventListener("click", function () {
    // 入力欄の内容を更新して件数表示
    updateVerifyCountInfo();
    elVerifyStop.classList.toggle("visible", verifyMode);
    elVerifyOverlay.classList.add("show");
  });

  elVerifyInput.addEventListener("input", updateVerifyCountInfo);

  function updateVerifyCountInfo() {
    var set = parseVerifyList(elVerifyInput.value);
    if (set.size > 0) {
      elVerifyCountInfo.textContent = "発送予定: " + set.size + " 件を認識しました";
    } else {
      elVerifyCountInfo.textContent = "";
    }
  }

  elVerifyCancel.addEventListener("click", function () {
    elVerifyOverlay.classList.remove("show");
  });

  elVerifyOverlay.addEventListener("click", function (e) {
    if (e.target === elVerifyOverlay) {
      elVerifyOverlay.classList.remove("show");
    }
  });

  // 照合開始
  elVerifyStart.addEventListener("click", function () {
    var set = parseVerifyList(elVerifyInput.value);
    if (set.size === 0) {
      showGlobalToast("発送予定のシリアルを貼り付けてください");
      return;
    }

    verifySet = set;
    verifyCheckedSet = new Set();
    verifyMode = true;

    elBtnVerifyMode.classList.add("active");
    elBtnVerifyMode.textContent = "照合中";
    elVerifyStop.classList.add("visible");
    elVerifyOverlay.classList.remove("show");
    elCountBadge.classList.add("verify-badge");
    updateVerifyBadge();

    showGlobalToast("照合モード開始。発送予定 " + verifySet.size + " 件と照合します", true);
  });

  // 照合モード終了
  elVerifyStop.addEventListener("click", function () {
    exitVerifyMode();
    elVerifyOverlay.classList.remove("show");
    showGlobalToast("照合モードを終了しました");
  });

  function exitVerifyMode() {
    verifyMode = false;
    verifySet = new Set();
    verifyCheckedSet = new Set();
    elBtnVerifyMode.classList.remove("active");
    elBtnVerifyMode.textContent = "照合";
    elVerifyStop.classList.remove("visible");
    elCountBadge.classList.remove("verify-badge");
    elCountNum.textContent = String(serialList.length);
  }

  // 未登録バッテリー検出時の警告表示
  function showUnregisteredAlert(serial) {
    alertShowing = true;
    elAlertSerial.textContent = serial;
    elAlertOverlay.classList.add("show");
    playAlarmTone();
  }

  elAlertDismiss.addEventListener("click", function () {
    elAlertOverlay.classList.remove("show");
    alertShowing = false;
    // 直前に検出したコードのクールダウンをリセットし、
    // 同じコードを再度スキャンできるようにする（誤操作時の再確認用）。
    lastDecodedText = null;
  });

  // ===== カメラ初期化・QR/バーコード検出（zxing-wasm使用） =====
  var mediaStream = null;
  var cameraStarted = false;
  var scanLoopId = null;
  var scanCanvas = document.createElement("canvas");
  var scanCanvasCtx = scanCanvas.getContext("2d", { willReadFrequently: true });
  var elScanVideo = document.getElementById("scan-video");

  var elCamStartOverlay = document.getElementById("cam-start-overlay");
  var elBtnStartCamera = document.getElementById("btn-start-camera");
  var elCamErrorDetail = document.getElementById("cam-error-detail");

  var isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS対策

  // zxing-wasm（ZXing-C++のWebAssembly版）を使用する。
  // これまで使用していた html5-qrcode（内部で zxing-js を使用）は、
  // バッテリー等に印刷された低コントラスト・小サイズのQRコードに対して
  // 検出できないケースが確認されたため、より検出精度の高いエンジンに切り替える。
  // tryHarder はデフォルトで true になっており、処理時間と引き換えに
  // 検出率を上げるモードで動作する。
  var zxingReaderOptions = {
    tryHarder: true,
    formats: ["QRCode", "Code128", "Code39", "EAN-13", "EAN-8", "UPC-A", "UPC-E", "ITF", "Codabar"],
    maxSymbols: 1
  };

  // スキャンのフレーム間隔（ミリ秒）。zxing-wasmはtryHarderにより
  // 1フレームあたりの処理コストが高いため、html5-qrcode使用時のfps指定より
  // 間隔を広めに取り、UIの応答性とバッテリー消費のバランスを取る。
  var scanIntervalMs = isIOS ? 220 : 150;

  function setOverlayError(message) {
    elCamErrorDetail.textContent = message;
    elCamErrorDetail.classList.add("show-error");
  }

  function clearOverlayError() {
    elCamErrorDetail.textContent = "";
    elCamErrorDetail.classList.remove("show-error");
  }

  // 起動前の環境チェック。起動できない根本原因を切り分けて表示する。
  function checkEnvironment() {
    if (!window.isSecureContext) {
      return "HTTPS（または localhost）でアクセスしてください。現在の接続では、ブラウザがカメラの利用を許可しません。";
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      return "この端末またはブラウザはカメラAPIに対応していません。Chrome または Safari の最新版でお試しください。";
    }
    return null;
  }

  function stringifyError(err) {
    if (!err) return "詳細不明のエラー";
    if (typeof err === "string") return err;
    var name = err.name || "";
    var message = err.message || "";
    if (!name && !message) {
      try { return JSON.stringify(err); } catch (e) { return String(err); }
    }
    return (name ? "[" + name + "] " : "") + message;
  }

  function describeStartError(err) {
    var msg = stringifyError(err);
    var hint = "";
    if (/NotAllowedError|Permission denied|denied/i.test(msg)) {
      hint = "カメラの利用が許可されていません。ブラウザのサイト設定でカメラを「許可」に変更し、再読み込みしてください。";
    } else if (/NotFoundError|no camera/i.test(msg)) {
      hint = "カメラが見つかりません。端末にカメラが搭載されているか確認してください。";
    } else if (/NotReadableError|TrackStartError/i.test(msg)) {
      hint = "カメラを他のアプリが使用中の可能性があります。他のカメラアプリを終了してから再度お試しください。";
    } else if (/OverconstrainedError/i.test(msg)) {
      hint = "指定した条件でカメラを起動できませんでした。";
    } else {
      hint = "カメラを起動できませんでした。";
    }
    // 原因切り分けのため、常に実際のエラー内容も併記する
    return hint + "\n[詳細] " + msg;
  }

  function startMediaStream(constraints) {
    return navigator.mediaDevices.getUserMedia({ video: constraints });
  }

  function initCamera() {
    if (window.__zxingLoadFailed || typeof ZXingWASM === "undefined") {
      setOverlayError("スキャンライブラリの読み込みに失敗しました。通信環境を確認し、ページを再読み込みしてください。");
      return;
    }

    var envError = checkEnvironment();
    if (envError) {
      setOverlayError(envError);
      return;
    }

    clearOverlayError();
    elBtnStartCamera.disabled = true;
    elBtnStartCamera.textContent = "起動しています…";

    var settled = false;
    var timeoutId = setTimeout(function () {
      if (settled) return;
      settled = true;
      elBtnStartCamera.disabled = false;
      elBtnStartCamera.textContent = "カメラを起動する";
      setOverlayError("カメラからの応答がありません。ブラウザのアドレスバー付近にカメラ権限のアイコンが出ていないか確認してください。表示されない場合は、ブラウザのサイト設定からこのページのカメラ権限を確認してください。");
    }, 8000);

    var errors = [];

    var finishWithError = function (errList) {
      if (settled) return;
      settled = true;
      clearTimeout(timeoutId);
      elBtnStartCamera.disabled = false;
      elBtnStartCamera.textContent = "カメラを起動する";
      var lastErr = errList[errList.length - 1] || "";
      setOverlayError(describeStartError(lastErr) + "\n\n[試行履歴]\n" + errList.join("\n"));
    };

    var finishWithSuccess = function (stream) {
      if (settled) return;
      settled = true;
      clearTimeout(timeoutId);
      onCameraStarted(stream);
    };

    // 高解像度指定つきの背面カメラでまず試し、失敗したら緩い指定で再試行する。
    // iOSは解像度要求を厳しくしすぎるとオートフォーカスが不安定になることがあるため、
    // やや控えめな値にする。
    var constraintsPrimary = {
      facingMode: { ideal: "environment" },
      width: { ideal: isIOS ? 1280 : 1920 },
      height: { ideal: isIOS ? 720 : 1080 }
    };
    var constraintsFallback = { facingMode: "environment" };

    startMediaStream(constraintsPrimary)
      .then(finishWithSuccess)
      .catch(function (err1) {
        errors.push(stringifyError(err1));
        startMediaStream(constraintsFallback)
          .then(finishWithSuccess)
          .catch(function (err2) {
            errors.push(stringifyError(err2));
            finishWithError(errors);
          });
      });
  }

  function onCameraStarted(stream) {
    mediaStream = stream;
    elScanVideo.srcObject = stream;
    elScanVideo.setAttribute("playsinline", "true");
    elScanVideo.muted = true;

    elScanVideo.play().catch(function () {
      // 一部ブラウザで play() が Promise を reject することがあるが、
      // srcObject 設定後は自動再生されるため致命的ではない。
    });

    cameraStarted = true;
    elCamStartOverlay.classList.add("hidden");
    elCamStatus.textContent = "";
    ensureAudioContext();

    elBtnStopCamera.classList.add("visible");

    startScanLoop();
  }

  // ===== フレーム解析ループ =====
  // <video> の現在のフレームを <canvas> に描画し、zxing-wasm でデコードを試みる。
  // setTimeout による自己再帰でループし、前フレームの解析が終わってから
  // 次フレームを取りにいくことで、処理が重い端末でもフレームが詰まらないようにする。
  var isScanBusy = false;

  function startScanLoop() {
    stopScanLoop();
    scanLoopId = setTimeout(scanFrame, scanIntervalMs);
  }

  function stopScanLoop() {
    if (scanLoopId) {
      clearTimeout(scanLoopId);
      scanLoopId = null;
    }
    isScanBusy = false;
  }

  function scanFrame() {
    if (!cameraStarted || isScanBusy) {
      scanLoopId = setTimeout(scanFrame, scanIntervalMs);
      return;
    }

    if (elScanVideo.readyState < 2 || !elScanVideo.videoWidth) {
      // まだ映像フレームが準備できていない
      scanLoopId = setTimeout(scanFrame, scanIntervalMs);
      return;
    }

    isScanBusy = true;

    try {
      var vw = elScanVideo.videoWidth;
      var vh = elScanVideo.videoHeight;

      // 中央の正方形領域のみを切り出して解析する。
      // 全体を解析するより対象領域に絞ったほうが処理が速く、
      // 走査枠で示しているエリアと実際の解析範囲が一致し分かりやすい。
      var cropSize = Math.floor(Math.min(vw, vh) * 0.85);
      var sx = Math.floor((vw - cropSize) / 2);
      var sy = Math.floor((vh - cropSize) / 2);

      scanCanvas.width = cropSize;
      scanCanvas.height = cropSize;
      scanCanvasCtx.drawImage(elScanVideo, sx, sy, cropSize, cropSize, 0, 0, cropSize, cropSize);

      var imageData = scanCanvasCtx.getImageData(0, 0, cropSize, cropSize);

      // zxing-wasm はバージョンによって関数名が異なる
      // （v1系: readBarcodesFromImageData / v2系以降: readBarcodes）ため、
      // 両方に対応できるようにする。
      var readFn = ZXingWASM.readBarcodesFromImageData || ZXingWASM.readBarcodes;

      readFn(imageData, zxingReaderOptions)
        .then(function (results) {
          isScanBusy = false;
          if (!cameraStarted) return;

          if (results && results.length > 0 && results[0].text) {
            onScanSuccess(results[0].text);
          }
          scanLoopId = setTimeout(scanFrame, scanIntervalMs);
        })
        .catch(function () {
          isScanBusy = false;
          if (!cameraStarted) return;
          scanLoopId = setTimeout(scanFrame, scanIntervalMs);
        });
    } catch (e) {
      isScanBusy = false;
      if (cameraStarted) {
        scanLoopId = setTimeout(scanFrame, scanIntervalMs);
      }
    }
  }

  elBtnStartCamera.addEventListener("click", function () {
    ensureAudioContext();
    initCamera();
  });

  // ===== カメラ停止 =====
  var elBtnStopCamera = document.getElementById("btn-stop-camera");

  function stopCamera() {
    stopScanLoop();
    cameraStarted = false;

    if (mediaStream) {
      mediaStream.getTracks().forEach(function (track) {
        track.stop();
      });
      mediaStream = null;
    }
    elScanVideo.srcObject = null;
  }

  elBtnStopCamera.addEventListener("click", function () {
    if (!cameraStarted) return;

    stopCamera();
    elBtnStopCamera.classList.remove("visible");
    elBtnStartCamera.disabled = false;
    elBtnStartCamera.textContent = "カメラを起動する";
    elCamStartOverlay.classList.remove("hidden");
    clearOverlayError();
    showGlobalToast("カメラを停止しました");
  });

  // ページ非表示時にカメラを一時停止（バッテリー節約・端末仕様上の安全策）
  document.addEventListener("visibilitychange", function () {
    if (!cameraStarted) return;
    if (document.hidden) {
      stopScanLoop();
      if (mediaStream) {
        mediaStream.getVideoTracks().forEach(function (t) { t.enabled = false; });
      }
    } else {
      if (mediaStream) {
        mediaStream.getVideoTracks().forEach(function (t) { t.enabled = true; });
      }
      if (cameraStarted) {
        startScanLoop();
      }
    }
  });

})();
</script>

</body>
</html>
